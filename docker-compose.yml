services:
  youflac:
    image: ghcr.io/kushiemoon-dev/youflac:latest
    container_name: youflac
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
      - "49997:49997"   # Soulseek (sldl) — amd64 only; leave mapped even on arm64 (harmless)
    volumes:
      - ${CONFIG_PATH:-./config}:/config
      - ${DOWNLOADS_PATH:-./downloads}:/downloads
      # SQLite ISRC cache + download history live under CONFIG_DIR (/config/youflac.db)
    environment:
      - PORT=8080
      - OUTPUT_DIR=/downloads
      - CONFIG_DIR=/config
      # Download settings
      - VIDEO_QUALITY=${VIDEO_QUALITY:-best}
      - CONCURRENT_DOWNLOADS=${CONCURRENT_DOWNLOADS:-2}
      - NAMING_TEMPLATE=${NAMING_TEMPLATE:-jellyfin}
      - GENERATE_NFO=${GENERATE_NFO:-true}
      - EMBED_COVER_ART=${EMBED_COVER_ART:-true}
      # Lyrics
      - LYRICS_ENABLED=${LYRICS_ENABLED:-false}
      - LYRICS_EMBED_MODE=${LYRICS_EMBED_MODE:-lrc}
      # Audio source priority (comma-separated) — UI display order only
      - AUDIO_SOURCE_PRIORITY=${AUDIO_SOURCE_PRIORITY:-tidal,qobuz,amazon,bandcamp,soulseek}
      # Source fallback order used by the download orchestrator (separate from UI priority)
      - SOURCE_ORDER=${SOURCE_ORDER:-tidal,qobuz,amazon,bandcamp,soulseek}
      # Soulseek credentials (required to activate Soulseek source; amd64 Docker only)
      - SOULSEEK_USERNAME=${SOULSEEK_USERNAME:-}
      - SOULSEEK_PASSWORD=${SOULSEEK_PASSWORD:-}
      - SOULSEEK_BINARY_PATH=${SOULSEEK_BINARY_PATH:-}
      # Download verification (FLAC integrity + quality gate)
      - VERIFY_DOWNLOADS=${VERIFY_DOWNLOADS:-true}
      - VERIFY_MIN_SAMPLE_RATE=${VERIFY_MIN_SAMPLE_RATE:-44100}
      - VERIFY_MIN_BIT_DEPTH=${VERIFY_MIN_BIT_DEPTH:-16}
      # YouTube anti-bot (optional)
      - COOKIES_BROWSER=${COOKIES_BROWSER:-}
      # UI settings
      - THEME=${THEME:-dark}
      - ACCENT_COLOR=${ACCENT_COLOR:-pink}
      - SOUND_EFFECTS_ENABLED=${SOUND_EFFECTS_ENABLED:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
