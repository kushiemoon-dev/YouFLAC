name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        shell: bash
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Generate Wails bindings
        run: wails generate module

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  binaries:
    needs: frontend-build
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
            binary: youflac-server
            pkg: youflac-server-linux-amd64
          - goos: linux
            goarch: arm64
            ext: tar.gz
            binary: youflac-server
            pkg: youflac-server-linux-arm64
          - goos: windows
            goarch: amd64
            ext: zip
            binary: youflac-server.exe
            pkg: youflac-server-windows-amd64
          - goos: darwin
            goarch: arm64
            ext: tar.gz
            binary: youflac-server
            pkg: youflac-server-darwin-arm64
    steps:
      - name: Checkout YouFLAC
        uses: actions/checkout@v4
        with:
          path: youflac
      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-go@v5
        with:
          go-version-file: youflac/go.mod
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: youflac/frontend/dist
      - name: Build binary
        working-directory: youflac
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X youflac/internal/api.AppVersion=${{ github.ref_name }}" \
            -o ${{ matrix.binary }} \
            ./cmd/server
      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        working-directory: youflac
        run: |
          mkdir -p dist/${{ matrix.pkg }}/frontend
          cp ${{ matrix.binary }} dist/${{ matrix.pkg }}/
          cp -r frontend/dist dist/${{ matrix.pkg }}/frontend/dist
          tar -czf ${{ matrix.pkg }}.tar.gz -C dist ${{ matrix.pkg }}
      - name: Package (zip)
        if: matrix.ext == 'zip'
        working-directory: youflac
        run: |
          mkdir -p dist/${{ matrix.pkg }}/frontend
          cp ${{ matrix.binary }} dist/${{ matrix.pkg }}/
          cp -r frontend/dist dist/${{ matrix.pkg }}/frontend/dist
          cd dist && zip -r ../${{ matrix.pkg }}.zip ${{ matrix.pkg }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: youflac/${{ matrix.pkg }}.${{ matrix.ext }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        shell: bash
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: wails build -platform windows/amd64 -trimpath -ldflags "-s -w -X youflac/internal/app.appVersion=${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: youflac-windows
          path: build/bin/youflac.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          CGO_ENABLED: '1'
        run: wails build -platform darwin/universal -trimpath -ldflags "-s -w -X youflac/internal/app.appVersion=${{ github.ref_name }}"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          if command -v create-dmg &>/dev/null; then
            create-dmg \
              --volname "YouFLAC" \
              --window-size 540 380 \
              --icon-size 100 \
              --app-drop-link 380 200 \
              build/bin/youflac.dmg \
              build/bin/youflac.app
          else
            hdiutil create \
              -volname "YouFLAC" \
              -srcfolder build/bin/youflac.app \
              -ov -format UDZO \
              build/bin/youflac.dmg
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: youflac-macos
          path: build/bin/youflac.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            upx \
            fuse \
            libfuse2
          # Wails v2 hardcodes webkit2gtk-4.0 in pkg-config; alias 4.1 → 4.0
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          CGO_ENABLED: '1'
        run: wails build -trimpath -ldflags "-s -w -X youflac/internal/app.appVersion=${{ github.ref_name }}"

      - name: Compress with UPX
        run: upx --best build/bin/youflac

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/bin/youflac AppDir/usr/bin/youflac
          cat > AppDir/youflac.desktop <<'EOF'
          [Desktop Entry]
          Name=YouFLAC
          Exec=youflac
          Icon=youflac
          Type=Application
          Categories=AudioVideo;Audio;
          EOF
          if [ -f build/appicon.png ]; then
            cp build/appicon.png AppDir/usr/share/icons/hicolor/256x256/apps/youflac.png
            cp build/appicon.png AppDir/youflac.png
          else
            convert -size 256x256 xc:#1a1a2e -fill white -font DejaVu-Sans -pointsize 48 \
              -gravity center -annotate 0 "Y" AppDir/youflac.png 2>/dev/null || \
              touch AppDir/youflac.png
            cp AppDir/youflac.png AppDir/usr/share/icons/hicolor/256x256/apps/youflac.png
          fi
          ln -sf usr/bin/youflac AppDir/AppRun
          ARCH=x86_64 appimagetool AppDir build/bin/youflac.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: youflac-linux
          path: build/bin/youflac.AppImage

  release:
    needs: [binaries, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: youflac-server-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: youflac-windows
      - uses: actions/download-artifact@v4
        with:
          name: youflac-macos
      - uses: actions/download-artifact@v4
        with:
          name: youflac-linux
      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## v${VERSION}[^0-9]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          generate_release_notes: true
          body: |
            ${{ steps.changelog.outputs.notes }}

            ## Install

            **Desktop app:** download the installer for your platform below — `youflac.exe` (Windows), `youflac.dmg` (macOS), or `youflac.AppImage` (Linux).

            **Headless / self-hosted:** download the server archive for your platform below, extract, and run `./youflac-server`.

          files: |
            youflac-server-linux-amd64.tar.gz
            youflac-server-linux-arm64.tar.gz
            youflac-server-windows-amd64.zip
            youflac-server-darwin-arm64.tar.gz
            youflac.exe
            youflac.dmg
            youflac.AppImage
