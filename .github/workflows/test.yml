name: Test & Coverage

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  # lint removed: golangci-lint does not yet support Go 1.25 — use `make lint` locally
  # Go unit tests live in YouFLAC-Core — this job verifies the module integration compiles
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout YouFLAC
        uses: actions/checkout@v4
        with:
          path: youflac
      - name: Checkout YouFLAC-Core
        uses: actions/checkout@v4
        with:
          repository: kushiemoon-dev/YouFLAC-Core
          path: YouFLAC-Core
      - uses: actions/setup-go@v5
        with:
          go-version-file: youflac/go.mod
      - name: Point replace directive to CI checkout
        working-directory: youflac
        run: go mod edit -replace github.com/kushiemoon-dev/youflac-core=../YouFLAC-Core
      - name: Build server
        working-directory: youflac
        run: go build ./cmd/server
      - name: Vet
        working-directory: youflac
        run: go vet ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
