name: Test & Coverage

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  # lint removed: golangci-lint does not yet support Go 1.25 — use `make lint` locally
  # youflac-core is a real pinned module dependency (go.mod) with its own CI/release
  # process — no sibling checkout needed here.
  build-check:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4
      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build
      - name: Build server
        run: go build ./cmd/server
      - name: Build desktop entrypoint
        run: go build .
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  test-frontend:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4
      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Create frontend/dist placeholder for embed
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - name: Generate Wails bindings
        run: wails generate module
      - run: pnpm exec tsc --noEmit
        working-directory: frontend
      - run: pnpm test:run
        working-directory: frontend
