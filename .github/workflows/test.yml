name: Test & Coverage

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  # lint removed: golangci-lint does not yet support Go 1.25 — use `make lint` locally
  # Go unit tests live in YouFLAC-Core — this job verifies the module integration compiles
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout YouFLAC
        uses: actions/checkout@v4
        with:
          path: youflac
      - name: Checkout YouFLAC-Core
        uses: actions/checkout@v4
        with:
          repository: kushiemoon-dev/YouFLAC-Core
          path: YouFLAC-Core
      - uses: actions/setup-go@v5
        with:
          go-version-file: youflac/go.mod
      - name: Point replace directive to CI checkout
        working-directory: youflac
        run: go mod edit -replace github.com/kushiemoon-dev/youflac-core=../YouFLAC-Core
      - name: Build server
        working-directory: youflac
        run: go build ./cmd/server
      - name: Create frontend/dist placeholder for embed
        working-directory: youflac
        run: mkdir -p frontend/dist
      - name: Vet
        working-directory: youflac
        run: go vet ./...

  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout YouFLAC-Core
        uses: actions/checkout@v4
        with:
          repository: kushiemoon-dev/YouFLAC-Core
          path: YouFLAC-Core
      - uses: actions/setup-go@v5
        with:
          go-version-file: YouFLAC-Core/go.mod
      - name: Run tests (CGO_ENABLED=0)
        working-directory: YouFLAC-Core
        run: CGO_ENABLED=0 go test ./... -short -timeout 60s
      - name: Vet
        working-directory: YouFLAC-Core
        run: CGO_ENABLED=0 go vet ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm exec tsc --noEmit
        working-directory: frontend
