name: Test & Coverage

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  # lint removed: golangci-lint does not yet support Go 1.25 — use `make lint` locally
  # youflac-core is a real pinned module dependency (go.mod) with its own CI/release
  # process — no sibling checkout needed here.
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build server
        run: go build ./cmd/server
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.1'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm exec tsc --noEmit
        working-directory: frontend
      - run: pnpm test:run
        working-directory: frontend
